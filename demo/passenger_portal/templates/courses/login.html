{% extends 'base.html' %}

{% block content %}
<!-- ФОРМА ЛОГИНА -->
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="fas fa-sign-in fa-2x mb-3" style="color: #0d47a1;"></i>
                    <h2 class="fw-bold" style="color: #333;">Вход в систему</h2>
                    <p class="text-muted">Введите ваши данные для входа</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-user me-1"></i> Логин
                        </label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Введите логин" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-lock me-1"></i> Пароль
                        </label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Введите пароль" required>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient w-100 py-3 fw-bold">
                        <i class="fas fa-sign-in-alt me-2"></i>Войти
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-0">Еще не зарегистрированы? 
                        <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Создать аккаунт</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
